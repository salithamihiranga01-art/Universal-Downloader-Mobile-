name: Build Flet APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet[all] yt-dlp requests

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Build APK
        run: |
          # මෙතැනදී අපි flet එකට කියනවා build කරන්න ඕනේ file එක mobile_app.py කියලා
          flet build apk mobile_app.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalDownloader-APK
          path: build/apk/*.apk
