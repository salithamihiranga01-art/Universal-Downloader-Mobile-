name: Build Flet APK

on:
  push:
    branches:
      - main  # ඔයා code එක push කරන්නේ වෙනත් branch එකකට නම් ඒ නම මෙතනට දාන්න

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet[all] yt-dlp requests

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Flet වලට ගැලපෙන stable version එකක්

      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalDownloader-APK
          path: build/apk/*.apk
